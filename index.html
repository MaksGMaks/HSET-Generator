<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSET Control Center - Server Selection</title>
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --border: #333; --text: #e0e0e0;
            --primary: #007acc; --primary-hover: #005f99; --secondary: #2d2d2d;
            --input-bg: #252525; --error: #f44336; --success: #4caf50;
        }
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); overflow: hidden; }
        .window-frame { width: 683px; height: 426px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; display: flex; flex-direction: column; padding: 20px; }
        .title-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .title-text { font-size: 14px; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        .exit-btn { background: transparent; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 5px 10px; }
        .exit-btn:hover { background: var(--error); color: white; }
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; flex: 1; }
        .connection-column { display: flex; flex-direction: column; gap: 15px; justify-content: center; }
        label { font-size: 11px; margin-bottom: -10px; opacity: 0.7; font-weight: bold; }
        input, select { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 6px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--primary); }
        .slot-info-box { border: 1px solid var(--border); border-radius: 8px; padding: 15px; position: relative; background: rgba(0,0,0,0.1); }
        .slot-info-box::before { content: "Interface Statistics"; position: absolute; top: -10px; left: 15px; background: var(--surface); padding: 0 5px; font-size: 11px; color: var(--primary); font-weight: bold; }
        .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .info-label { font-size: 12px; font-weight: 600; opacity: 0.8; }
        .info-value { width: 110px; padding: 4px; background: var(--bg); border-radius: 4px; font-size: 11px; text-align: center; border: 1px solid var(--border); font-family: monospace; }
        .button-row { display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px; }
        .btn { padding: 10px 25px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .btn-search { background: var(--secondary); color: var(--text); border: 1px solid var(--border); }
        .btn-connect { background: var(--primary); color: white; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); z-index: 100; border-radius: 8px; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .loader { border: 3px solid #333; border-top: 3px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="window-frame">
    <div class="overlay" id="loading-overlay">
        <div class="loader"></div>
        <div id="overlay-text">Connecting to Hardware...</div>
    </div>

    <div class="title-bar">
        <div class="title-text">HSET Generator Manager</div>
        <button class="exit-btn" onclick="window.close()">×</button>
    </div>

    <div class="main-content">
        <div class="connection-column">
            <label>Server IP / Tunnel Address</label>
            <input type="text" id="address-input" placeholder="e.g. 127.0.0.1" value="127.0.0.1">

            <label>Available Interface Slots</label>
            <select id="slots-dropdown">
                <option value="">Search for hardware first...</option>
            </select>
        </div>

        <div class="slot-info-box">
            <div class="info-row"><span class="info-label">PF_RING</span><div class="info-value" id="val-pf">N/A</div></div>
            <div class="info-row"><span class="info-label">PF_RING_ZC</span><div class="info-value" id="val-zc">N/A</div></div>
            <div class="info-row"><span class="info-label">DPDK SUPPORT</span><div class="info-value" id="val-dpdk">N/A</div></div>
            <div class="info-row"><span class="info-label">INTERFACE</span><div class="info-value" id="val-iface">N/A</div></div>
            <div class="info-row"><span class="info-label">STATUS</span><div class="info-value" id="val-status">IDLE</div></div>
        </div>
    </div>

    <div class="button-row">
        <button class="btn btn-search" id="btn-search" onclick="onSearchClicked()">Search Hardware</button>
        <button class="btn btn-connect" id="btn-connect" onclick="onConnectClicked()" disabled>Initialize Slot</button>
    </div>
</div>

    function updateSlotDetails(index) {
        const slot = availableSlots[index];
        if (!slot) return;
        document.getElementById('val-pf').innerText = slot.PfRingSupported ? "YES" : "NO";
        document.getElementById('val-zc').innerText = slot.PfRingZcSupported ? "YES" : "NO";
        document.getElementById('val-dpdk').innerText = slot.DpdkSupported ? "READY" : "NO";
        document.getElementById('val-iface').innerText = slot.InterfaceName;
        document.getElementById('val-status').innerText = "ONLINE";
        document.getElementById('val-status').style.color = "var(--success)";
    }

    async function onSearchClicked() {
        let input = addressInput.value.trim();
        if (!input) return alert("Enter IP");

        const isLocal = input === "127.0.0.1" || input === "localhost";
        // Force WebSocket protocol for browser compatibility
        const protocol = isLocal ? "http://" : "https://";
        const finalUrl = `${protocol}${input.replace(/^https?:\/\//, '')}:${STATIC_PORT}/status`;

        overlay.style.display = 'flex';

        try {
            // In a real scenario, the C++ server needs to respond to this GET request
            const response = await fetch(finalUrl);
            const data = await response.json();

            if (data.slots) {
                availableSlots = data.slots;
                slotsDropdown.innerHTML = '';
                data.slots.forEach((slot, index) => {
                    const opt = document.createElement('option');
                    opt.value = index;
                    // Only allow connecting if slot is not busy
                    opt.disabled = slot.busy;
                    opt.textContent = `${slot.InterfaceName} ${slot.busy ? '(BUSY)' : '(READY)'}`;
                    slotsDropdown.appendChild(opt);
                });
                btnConnect.disabled = false;
            }
        } catch (error) {
            alert("Server found, but ensure CORS is enabled in C++.");
        } finally {
            overlay.style.display = 'none';
        }
    }

    function onConnectClicked() {
        const selected = availableSlots[slotsDropdown.value];
        const host = addressInput.value.trim();
        // Pass the target to Page 2
        window.location.href = `page2.html?host=${host}&port=${selected.Port}`;
