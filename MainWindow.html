<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Speed Traffic Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --border: #333;
            --text: #e0e0e0;
            --primary: #007acc;
            --secondary: #3a3a3a;
            --success: #4caf50;
            --error: #f44336;
            --input-bg: #252525;
        }

        [data-theme="light"] {
            --bg: #f5f5f5;
            --surface: #ffffff;
            --border: #cccccc;
            --text: #202020;
            --primary: #005fb8;
            --secondary: #e1e1e1;
            --input-bg: #f9f9f9;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

        nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; padding: 0 10px; z-index: 100; }
        .menu-item { position: relative; padding: 10px 15px; cursor: pointer; font-size: 14px; }
        .menu-item:hover { background: var(--secondary); }
        .dropdown { display: none; position: absolute; top: 100%; left: 0; background: var(--surface); border: 1px solid var(--border); min-width: 160px; }
        .menu-item:hover .dropdown { display: block; }

        main { display: grid; grid-template-columns: 380px 1fr; flex: 1; overflow: hidden; }
        .sidebar { padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; }
        .group-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 15px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 12px; align-items: center; }
        input, select { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 4px; width: 100%; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 10px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        .btn-start { background: var(--primary); color: white; }
        .btn-pause { background: var(--secondary); color: var(--text); }

        .dashboard { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .stat-card { background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }

        .tabs { display: flex; gap: 5px; }
        .tab { padding: 10px 20px; background: var(--secondary); cursor: pointer; }
        .tab.active { background: var(--surface); border-bottom: 2px solid var(--primary); }

        .chart-area { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; flex: 1; padding: 15px; }
    </style>
</head>
<body>

<main>
    <section class="sidebar">
        <div class="group-box">
            <div class="form-grid">
                <label>Interface:</label>
                <input type="text" value="None" id="in-interface" readonly>

                <label>Mode:</label>
                <select id="in-mode"><option value="0">None</option></select>

                <label>Pref. Speed:</label>
                <input type="number" value="0" id="in-speed">

                <label>Packet Size:</label>
                <input type="number" value="16" id="in-size">

                <label>Burst Size:</label>
                <input type="number" value="1" id="in-burst">

                <label>Copies:</label>
                <input type="number" value="0" id="in-copies">

                <label>Sent:</label>
                <input type="number" value="0" id="in-sent">

                <label>Packet Pattern:</label>
                <input type="text" value="AA" maxlength="2" id="in-pattern">

                <label>Time:</label>
                <input type="time" value="00:00:00" step="1" id="in-time">
            </div>

            <div class="btn-row">
                <button class="btn-start" id="btn-start" onclick="onStartClicked()">▶ Start</button>
                <button class="btn-pause" id="btn-pause" onclick="onPauseClicked()" disabled>|| Pause</button>
            </div>
        </div>
    </section>

    <section class="dashboard">
        <div class="stats-grid">
            <div class="stat-card">
                <div>Speed</div>
                <div><span id="val-speed">0</span> <small id="val-unit">Mbps</small></div>
            </div>
            <div class="stat-card">
                <div>PPS</div>
                <div id="val-pps">0</div>
            </div>
            <div class="stat-card">
                <div>Total</div>
                <div id="val-total">0</div>
            </div>
        </div>

        <div style="flex:1; display:flex; flex-direction:column;">
            <div class="tabs">
                <div class="tab active" onclick="switchUnit('bps', this)">Bits / s</div>
                <div class="tab" onclick="switchUnit('BPS', this)">Bytes / s</div>
            </div>
            <div class="chart-area">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </section>
</main>

<script>
    let socket = null;
    let isRunning = false;
    let isPaused = false;
    let currentUnit = "bps";

    // ===== CHART =====
    let chart;
    let chartData = {
        labels: [],
        datasets: [{
            label: "bps",
            data: [],
            borderWidth: 2,
            tension: 0.2
        }]
    };

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: chartData,
            options: {
                animation: false,
                responsive: true,
                scales: {
                    x: { display: false },
                    y: { beginAtZero: true }
                }
            }
        });
    }

    // ===== SWITCH TABS =====
    function switchUnit(unit, el) {
        currentUnit = unit;

        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');

        chart.data.datasets[0].label = unit;
        chart.data.datasets[0].data = [];
        chart.data.labels = [];
        chart.update();
    }

    // ===== UPDATE CHART =====
    function updateChart(bps, BPS) {
        const value = currentUnit === "bps" ? bps : BPS;

        chart.data.labels.push('');
        chart.data.datasets[0].data.push(value);

        if (chart.data.labels.length > 50) {
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
        }

        chart.update();
    }

    // ===== UI =====
    function updateUI(bps, BPS, pps, total) {
        document.getElementById('val-speed').innerText = bps.toFixed(2);
        document.getElementById('val-pps').innerText = pps;
        document.getElementById('val-total').innerText = total;
    }

    // ===== DATA =====
    function processDataResponse(obj) {
        if (!isRunning) return;

        const bps = Number(obj["bps"] || 0);
        const BPS = Number(obj["BPS"] || 0);
        const pps = Number(obj["pps"] || 0);
        const total = Number(obj["totalSend"] || 0);

        updateUI(bps, BPS, pps, total);
        updateChart(bps, BPS);
    }

    // ===== WS =====
    function initConnection() {
        const urlParams = new URLSearchParams(window.location.search);
        let targetHost = urlParams.get('host') || window.location.hostname;
        let targetPort = urlParams.get('target_port') || "8080";

        const hostClean = targetHost.replace(/^https?:\/\//, '');
        const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const connectionUrl = `${targetHost}`; // ${wsProtocol}${hostClean}

        console.log("[WS] Connecting:", connectionUrl); //

        socket = new WebSocket(connectionUrl);

        socket.onopen = () => {
            console.log("[WS] Connected");
        };

        socket.onmessage = (event) => {
            handleMessage(event.data);
        };

        socket.onclose = () => {
            console.warn("[WS] Connection closed");
            isRunning = false;
            isPaused = false;
            resetUIState();
        };

        socket.onerror = (err) => {
            console.error("[WS] Error:", err);
        };
    }

    function handleMessage(raw) {
        const obj = JSON.parse(raw);
        if (obj.type === "ACK") return;

        if (obj.status === "CONNECTED") {
            document.getElementById('in-interface').value = obj["InterfaceName"];
            return;
        }

        processDataResponse(obj);
    }

    // ===== CONTROL =====
    function onStartClicked() {
        if (!socket || socket.readyState !== WebSocket.OPEN) return;

        isRunning = true;

        socket.send(JSON.stringify([{
            TYPE: 2,
            COMMAND: 0
        }]));
    }

    function onPauseClicked() {
        if (!socket) return;
        socket.send(JSON.stringify([{ TYPE: 2, COMMAND: isPaused ? 2 : 1 }]));
    }

    // ===== INIT =====
    window.onload = () => {
        initChart();
        initConnection();
    };
</script>

</body>
</html>
