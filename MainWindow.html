<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Speed Traffic Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --border: #333;
            --text: #e0e0e0;
            --primary: #007acc;
            --secondary: #3a3a3a;
            --success: #4caf50;
            --error: #f44336;
            --input-bg: #252525;
        }

        [data-theme="light"] {
            --bg: #f5f5f5;
            --surface: #ffffff;
            --border: #cccccc;
            --text: #202020;
            --primary: #005fb8;
            --secondary: #e1e1e1;
            --input-bg: #f9f9f9;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

        /* Menu Bar */
        nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; padding: 0 10px; z-index: 100; }
        .menu-item { position: relative; padding: 10px 15px; cursor: pointer; font-size: 14px; }
        .menu-item:hover { background: var(--secondary); }
        .dropdown { display: none; position: absolute; top: 100%; left: 0; background: var(--surface); border: 1px solid var(--border); min-width: 160px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .menu-item:hover .dropdown { display: block; }
        .dropdown div { padding: 10px; font-size: 13px; }
        .dropdown div:hover { background: var(--primary); color: white; }

        /* Main Layout */
        main { display: grid; grid-template-columns: 380px 1fr; flex: 1; overflow: hidden; }
        
        /* Sidebar / Parameters */
        .sidebar { padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--bg); }
        .group-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .group-box h3 { margin-top: 0; font-size: 14px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 12px; align-items: center; }
        label { font-size: 13px; font-weight: 600; }
        input, select { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 4px; width: 100%; }
        
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 10px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-start { background: var(--primary); color: white; }
        .btn-pause { background: var(--secondary); color: var(--text); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Dashboard */
        .dashboard { padding: 20px; display: flex; flex-direction: column; gap: 20px; background: var(--bg); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .stat-card { background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.7; margin-bottom: 5px; }
        .stat-value { font-size: 22px; font-weight: bold; color: var(--primary); }

        /* Tabs & Charts */
        .tabs { display: flex; gap: 5px; margin-bottom: -1px; }
        .tab { padding: 10px 20px; background: var(--secondary); border: 1px solid var(--border); border-bottom: none; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 13px; }
        .tab.active { background: var(--surface); border-bottom: 2px solid var(--primary); font-weight: bold; }
        .chart-area { background: var(--surface); border: 1px solid var(--border); border-radius: 0 8px 8px 8px; flex: 1; padding: 15px; position: relative; }
    </style>
</head>
<body>

<nav>
    <div class="menu-item" id="m-file">File
        <div class="dropdown">
            <div onclick="saveGraph()">Save Graph as PNG</div>
        </div>
    </div>
    <div class="menu-item" id="m-settings">Settings
        <div class="dropdown">
            <div onclick="setTheme('dark')">Dark Theme</div>
            <div onclick="setTheme('light')">Light Theme</div>
            <hr style="border:0; border-top:1px solid var(--border)">
            <div onclick="setLanguage('en')">English</div>
            <div onclick="setLanguage('uk')">Українська</div>
        </div>
    </div>
    <div class="menu-item" id="m-help" onclick="alert('Traffic Generator Help')">Help</div>
</nav>

<main>
    <section class="sidebar">
        <div class="group-box">
            <h3 id="t-params">Parameters</h3>
            <div class="form-grid">
                <label id="l-interface">Interface:</label>
                <input type="text" value="eth0" id="in-interface">
                
                <label id="l-mode">Mode:</label>
                <select id="in-mode">
                    <option value="1">PF_RING Standard</option>
                    <option value="2">PF_RING ZC</option>
                    <option value="3">DPDK</option>
                </select>

                <label id="l-speed">Pref. Speed:</label>
                <input type="number" value="1000" id="in-speed">

                <label id="l-pkt-size">Packet Size:</label>
                <input type="number" value="64" id="in-size">

                <label id="l-time">Time:</label>
                <input type="time" value="00:00:00" step="1" id="in-time">
            </div>

            <div style="margin-top: 15px;">
                <button id="btn-file" style="width:100%; margin-bottom:10px;" onclick="toggleFileMode()">📁 Send File: OFF</button>
                <input type="text" placeholder="No file selected" id="file-path" readonly style="font-size:11px;">
            </div>

            <div class="btn-row">
                <button class="btn-start" id="btn-start" onclick="onStartClicked()">▶ Start</button>
                <button class="btn-pause" id="btn-pause" onclick="onPauseClicked()" disabled>|| Pause</button>
            </div>
        </div>
    </section>

    <section class="dashboard">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label" id="l-stat-speed">Current Speed</div>
                <div class="stat-value"><span id="val-speed">0.00</span> <small style="font-size:12px" id="val-unit">Mbps</small></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">PPS</div>
                <div class="stat-value" id="val-pps">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label" id="l-stat-total">Total Sent</div>
                <div class="stat-value" id="val-total">0</div>
            </div>
        </div>

        <div style="flex:1; display:flex; flex-direction:column;">
            <div class="tabs">
                <div class="tab active" onclick="switchUnit('bps', this)">Bits / s</div>
                <div class="tab" onclick="switchUnit('BPS', this)">Bytes / s</div>
            </div>
            <div class="chart-area">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </section>
</main>

<script>
    // --- State Management ---
    let isRunning = false;
    let isPaused = false;
    let currentUnit = 'bps'; // bps or BPS
    let timerIdx = 0;
    let dataPoints = [];
    let simulationTimer = null;

    // --- Translations ---
    const i18n = {
        en: {
            params: "Parameters", interface: "Interface:", mode: "Mode:", 
            speed: "Pref. Speed:", size: "Packet Size:", time: "Time:",
            start: "▶ Start", stop: "■ Stop", curSpeed: "Current Speed", total: "Total Sent"
        },
        uk: {
            params: "Параметри", interface: "Інтерфейс:", mode: "Режим:", 
            speed: "Бажана швидкість:", size: "Розмір пакету:", time: "Час:",
            start: "▶ Старт", stop: "■ Стоп", curSpeed: "Поточна швидкість", total: "Всього відправлено"
        }
    };

    // --- Chart Setup ---
    const ctx = document.getElementById('mainChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Traffic rate',
                data: [],
                borderColor: '#007acc',
                backgroundColor: 'rgba(0, 122, 204, 0.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            scales: {
                x: { grid: { display: false }, ticks: { color: '#888' } },
                y: { beginAtZero: true, ticks: { color: '#888' } }
            },
            plugins: { legend: { display: false } }
        }
    });

    // --- Core Logic ---
    function onStartClicked() {
        isRunning = !isRunning;
        const btn = document.getElementById('btn-start');
        const pauseBtn = document.getElementById('btn-pause');

        if (isRunning) {
            btn.innerText = i18n[currentLang].stop;
            btn.style.background = "var(--error)";
            pauseBtn.disabled = false;
            startSim();
        } else {
            btn.innerText = i18n[currentLang].start;
            btn.style.background = "var(--primary)";
            pauseBtn.disabled = true;
            stopSim();
        }
    }

    function onPauseClicked() {
        isPaused = !isPaused;
        document.getElementById('btn-pause').innerText = isPaused ? "▶ Resume" : "|| Pause";
    }

    function startSim() {
        timerIdx = 0;
        dataPoints = [];
        chart.data.labels = [];
        chart.data.datasets[0].data = [];
        
        simulationTimer = setInterval(() => {
            if (isPaused) return;

            // Generate mock data (simulating your receivedData struct)
            const rawBps = Math.random() * 800000000 + 100000000; // ~100-900 Mbps
            const pps = Math.floor(rawBps / (64 * 8));
            
            updateUI(rawBps, pps);
            updateChart(rawBps);
        }, 1000);
    }

    function stopSim() {
        clearInterval(simulationTimer);
    }

    function updateUI(bps, pps) {
        let val, unit;
        if (bps >= 1e9) { val = bps / 1e9; unit = "Gbps"; }
        else if (bps >= 1e6) { val = bps / 1e6; unit = "Mbps"; }
        else { val = bps / 1e3; unit = "Kbps"; }

        document.getElementById('val-speed').innerText = val.toFixed(2);
        document.getElementById('val-unit').innerText = unit;
        document.getElementById('val-pps').innerText = pps.toLocaleString();
        document.getElementById('val-total').innerText = (parseInt(document.getElementById('val-total').innerText.replace(/,/g, '')) + (bps/8)).toLocaleString();
    }

    function updateChart(bps) {
        const value = currentUnit === 'bps' ? bps : bps / 8;
        timerIdx++;
        
        chart.data.labels.push(timerIdx);
        chart.data.datasets[0].data.push(value);

        if (chart.data.labels.length > 20) {
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
        }
        chart.update();
    }

    // --- UI Helpers ---
    let currentLang = 'en';
    function setLanguage(lang) {
        currentLang = lang;
        const dict = i18n[lang];
        document.getElementById('t-params').innerText = dict.params;
        document.getElementById('l-interface').innerText = dict.interface;
        document.getElementById('l-mode').innerText = dict.mode;
        document.getElementById('l-speed').innerText = dict.speed;
        document.getElementById('l-pkt-size').innerText = dict.size;
        document.getElementById('l-time').innerText = dict.time;
        document.getElementById('btn-start').innerText = isRunning ? dict.stop : dict.start;
        document.getElementById('l-stat-speed').innerText = dict.curSpeed;
        document.getElementById('l-stat-total').innerText = dict.total;
    }

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        chart.options.scales.x.ticks.color = theme === 'dark' ? '#888' : '#444';
        chart.options.scales.y.ticks.color = theme === 'dark' ? '#888' : '#444';
        chart.update();
    }

    function switchUnit(unit, el) {
        currentUnit = unit;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        // In a real app, you would rescale the existing dataPoints here
    }

    function toggleFileMode() {
        const btn = document.getElementById('btn-file');
        const isOff = btn.innerText.includes("OFF");
        btn.innerText = isOff ? "📁 Send File: ON" : "📁 Send File: OFF";
        btn.style.background = isOff ? "var(--success)" : "var(--secondary)";
    }

    function saveGraph() {
        const link = document.createElement('a');
        link.download = 'traffic_graph.png';
        link.href = document.getElementById('mainChart').toDataURL('image/png');
        link.click();
    }

    let socket = null;
    const urlParams = new URLSearchParams(window.location.search);
    const targetHost = urlParams.get('host');
    const targetPort = urlParams.get('port');

    function initConnection() {
        // 1. Strip 'http://' or 'https://' from the targetHost if it exists
        const hostClean = targetHost.replace(/^https?:\/\//, '');

        // 2. Determine protocol
        const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';

        // 3. Construct the clean URL
        const connectionUrl = `${wsProtocol}${hostClean}:${targetPort}`;

        console.log(`Connecting to: ${connectionUrl}`);
        socket = new WebSocket(connectionUrl);

        socket.onopen = () => {
            console.log("Connected to hardware slot.");
            isInitialized = false;
        };

        socket.onmessage = (event) => {
            handleMessage(event.data);
        };

        socket.onclose = () => {
            console.log("Disconnected.");
            alert("Connection closed.");
            window.location.href = 'index.html';
        };

        socket.onerror = (err) => {
            console.error("WebSocket Error: Check if the server is running and supports WebSockets.");
        };
    }

    /**
     * Logic Switcher: Mirrors the transition from
     * getInterfaceInfo() to dataResponseReceive()
     */
    function handleMessage(rawData) {
        try {
            const jsonResponse = JSON.parse(rawData);

            // Qt client expects an array: jsonResponse.array().at(0).toObject()
            const dataObject = Array.isArray(jsonResponse) ? jsonResponse[0] : jsonResponse;

            if (!isInitialized) {
                // --- Equivalent to NetworkManager::getInterfaceInfo() ---
                processInterfaceInfo(dataObject);
                isInitialized = true;
            } else {
                // --- Equivalent to NetworkManager::dataResponseReceive() ---
                processDataResponse(dataObject);
            }
        } catch (e) {
            console.error("[NetworkManager] Invalid JSON or Parse Error", e);
        }
    }

    /**
     * Updates UI with hardware capabilities
     */
    function processInterfaceInfo(obj) {
        console.log("Received device info:", obj);

        // Mapping from your C++ jsonHeaders
        const mode = {
            name: obj["InterfaceName"],
            dpdk: obj["DpdkSupported"],
            pf_ring: obj["PfRingSupported"],
            zc: obj["PfRingZcSupported"]
        };

        // Update UI elements (Interface name, etc.)
        document.getElementById('in-interface').value = mode.name;
        // You could also disable/enable dropdown options based on .dpdk or .pf_ring
    }

    /**
     * Updates UI with real-time traffic stats
     */
    function processDataResponse(obj) {
        if (!isRunning) return;

        // Mapping from your C++ jsonHeaders::receivedData
        const stats = {
            BPS: parseFloat(obj["BPS"]),
            bps: parseFloat(obj["bps"]),
            pps: parseInt(obj["pps"]),
            total: parseInt(obj["TotalSend"])
        };

        // Update Dashboard & Chart
        updateUI(stats.bps, stats.pps); // Function from your existing page2 script
        updateChart(stats.bps);         // Function from your existing page2 script
        document.getElementById('val-total').innerText = stats.total.toLocaleString();
    }

    /**
     * Equivalent to NetworkManager::startGenerator()
     */
    function onStartClicked() {
        if (isRunning) {
            stopGenerator();
            return;
        }

        // Prepare JSON Array exactly like Qt: startRespArray.append(startRespObj)
        const params = [{
            "type": 1,    // TypeC::REQUEST
            "command": 1, // CommandC::START
            "params": {
                "mode": document.getElementById('in-mode').value,
                "speed": document.getElementById('in-speed').value,
                "pack_size": document.getElementById('in-size').value,
                "time": "0", // Add other params as needed
                "burst_size": "1",
                "packet_pattern": "0",
                "file_send": false,
                "copies": "1",
                "total_send": "0"
            }
        }];

        socket.send(JSON.stringify(params));
        isRunning = true;

        // Update UI Button
        const btn = document.getElementById('btn-start');
        btn.innerText = "■ Stop";
        btn.style.background = "var(--error)";
        document.getElementById('btn-pause').disabled = false;
    }

    /**
     * Equivalent to NetworkManager::stopGenerator()
     */
    function stopGenerator() {
        const params = [{
            "type": 1,
            "command": 4 // CommandC::FINISH (or STOP)
        }];

        socket.send(JSON.stringify(params));
        isRunning = false;

        const btn = document.getElementById('btn-start');
        btn.innerText = "▶ Start";
        btn.style.background = "var(--primary)";
        document.getElementById('btn-pause').disabled = true;
    }

    /**
     * Equivalent to NetworkManager::pauseGenerator()
     */
    function onPauseClicked() {
        const isCurrentlyPaused = document.getElementById('btn-pause').innerText.includes("Resume");

        const params = [{
            "type": 1,
            "command": isCurrentlyPaused ? 3 : 2 // RESUME=3, PAUSE=2
        }];

        socket.send(JSON.stringify(params));

        document.getElementById('btn-pause').innerText = isCurrentlyPaused ? "|| Pause" : "▶ Resume";
    }

    // Call this when page loads
    window.onload = initConnection;
</script>

</body>
</html>
