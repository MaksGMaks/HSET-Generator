<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>High Speed Traffic Generator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#1e1e1e;
    color:white;
}

nav{
    background:#2d2d2d;
    padding:10px;
}

nav span{
    margin-right:20px;
    cursor:pointer;
}

.container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

.panel{
    background:#2b2b2b;
    padding:15px;
    border-radius:6px;
}

.parameters{width:350px;}
.info{width:220px;}
.graph{width:650px;}

label{
    display:block;
    margin-top:10px;
}

input,select,button{
    width:100%;
    padding:5px;
    margin-top:5px;
}

.controls{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.tabs{
    display:flex;
    margin-bottom:10px;
}

.tab{
    padding:5px 10px;
    background:#444;
    cursor:pointer;
}

.tab.active{
    background:#777;
}

canvas{
    background:white;
}

</style>
</head>

<body>

<nav>
<span>File</span>
<span>Save</span>
<span>Settings</span>
<span>Help</span>
</nav>


<div class="container">

<!-- GRAPH AREA -->

<div class="panel graph">

<div class="tabs">
<div class="tab active" onclick="switchTab(0)">Bits per second</div>
<div class="tab" onclick="switchTab(1)">Bytes per second</div>
</div>

<canvas id="bpsChart"></canvas>
<canvas id="BPSChart" style="display:none"></canvas>

<div class="controls">
<button onclick="startStop()" id="startBtn">Start</button>
<button onclick="pauseResume()" id="pauseBtn">Pause</button>
<input type="time" step="1" id="timeInput" value="00:00:00">
</div>

</div>


<!-- INFO PANEL -->

<div class="panel info">

<h3>Info</h3>

<label>Speed</label>
<input id="speed" readonly>

<label>PPS</label>
<input id="pps" readonly>

<label>Total Sent</label>
<input id="totalSend" readonly>

<label>Total Copies</label>
<input id="totalCopies" readonly>

</div>


<!-- PARAMETERS PANEL -->

<div class="panel parameters">

<h3>Parameters</h3>

<label>Interface</label>
<select id="interface">
<option>eth0</option>
<option>eth1</option>
</select>

<label>Mode</label>
<select id="mode">
<option>PF_RING</option>
<option>DPDK</option>
</select>

<label>Preferred Speed</label>
<input id="speedParam" value="0">

<label>Packet Size</label>
<input id="packetSize" value="64">

<label>Burst Size</label>
<input id="burstSize" value="1">

<label>Copies</label>
<input id="copies" value="0">

<label>Sent</label>
<input id="sent" value="0">

<label>Packet Pattern</label>
<input id="pattern" value="AA">

<label>Send File</label>
<button onclick="toggleFile()">Toggle</button>

<input type="file" id="fileInput">

</div>

</div>


<script>

let running=false
let paused=false
let time=0


const bpsChart=new Chart(
document.getElementById("bpsChart"),
{
type:'line',
data:{
labels:[],
datasets:[{label:'bps',data:[],borderColor:'red'}]
},
options:{animation:false}
}
)

const BPSChart=new Chart(
document.getElementById("BPSChart"),
{
type:'line',
data:{
labels:[],
datasets:[{label:'BPS',data:[],borderColor:'blue'}]
},
options:{animation:false}
}
)


function switchTab(i){

document.getElementById("bpsChart").style.display = i==0?"block":"none"
document.getElementById("BPSChart").style.display = i==1?"block":"none"

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.querySelectorAll(".tab")[i].classList.add("active")

}


function startStop(){

if(running){

running=false
document.getElementById("startBtn").innerText="Start"

}else{

running=true
document.getElementById("startBtn").innerText="Stop"
simulateGenerator()

}

}


function pauseResume(){

if(!running)return

paused=!paused
document.getElementById("pauseBtn").innerText=paused?"Resume":"Pause"

}


function toggleFile(){

const file=document.getElementById("fileInput")
file.style.display = file.style.display==="none"?"block":"none"

}


function simulateGenerator(){

if(!running)return
if(paused){
setTimeout(simulateGenerator,1000)
return
}

time++

const bps=Math.random()*1000
const BPS=Math.random()*1000

bpsChart.data.labels.push(time)
bpsChart.data.datasets[0].data.push(bps)

BPSChart.data.labels.push(time)
BPSChart.data.datasets[0].data.push(BPS)

bpsChart.update()
BPSChart.update()

document.getElementById("pps").value=Math.floor(Math.random()*100000)
document.getElementById("speed").value=BPS.toFixed(2)
document.getElementById("totalSend").value=time*100
document.getElementById("totalCopies").value=time*2

setTimeout(simulateGenerator,1000)

}

</script>

</body>
</html>
