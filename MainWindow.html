<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Speed Traffic Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --border: #333;
            --text: #e0e0e0;
            --primary: #007acc;
            --secondary: #3a3a3a;
            --success: #4caf50;
            --error: #f44336;
            --input-bg: #252525;
        }

        [data-theme="light"] {
            --bg: #f5f5f5;
            --surface: #ffffff;
            --border: #cccccc;
            --text: #202020;
            --primary: #005fb8;
            --secondary: #e1e1e1;
            --input-bg: #f9f9f9;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

        /* Menu Bar */
        nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; padding: 0 10px; z-index: 100; }
        .menu-item { position: relative; padding: 10px 15px; cursor: pointer; font-size: 14px; }
        .menu-item:hover { background: var(--secondary); }
        .dropdown { display: none; position: absolute; top: 100%; left: 0; background: var(--surface); border: 1px solid var(--border); min-width: 160px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .menu-item:hover .dropdown { display: block; }
        .dropdown div { padding: 10px; font-size: 13px; }
        .dropdown div:hover { background: var(--primary); color: white; }

        /* Main Layout */
        main { display: grid; grid-template-columns: 380px 1fr; flex: 1; overflow: hidden; }

        /* Sidebar / Parameters */
        .sidebar { padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--bg); }
        .group-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .group-box h3 { margin-top: 0; font-size: 14px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 12px; align-items: center; }
        label { font-size: 13px; font-weight: 600; }
        input, select { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 4px; width: 100%; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 10px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-start { background: var(--primary); color: white; }
        .btn-pause { background: var(--secondary); color: var(--text); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Dashboard */
        .dashboard { padding: 20px; display: flex; flex-direction: column; gap: 20px; background: var(--bg); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .stat-card { background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.7; margin-bottom: 5px; }
        .stat-value { font-size: 22px; font-weight: bold; color: var(--primary); }

        /* Tabs & Charts */
        .tabs { display: flex; gap: 5px; margin-bottom: -1px; }
        .tab { padding: 10px 20px; background: var(--secondary); border: 1px solid var(--border); border-bottom: none; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 13px; }
        .tab.active { background: var(--surface); border-bottom: 2px solid var(--primary); font-weight: bold; }
        .chart-area { background: var(--surface); border: 1px solid var(--border); border-radius: 0 8px 8px 8px; flex: 1; padding: 15px; position: relative; }
    </style>
</head>
<body>

<nav>
    <div class="menu-item" id="m-file">File
        <div class="dropdown">
            <div onclick="saveGraph()">Save Graph as PNG</div>
        </div>
    </div>
    <div class="menu-item" id="m-settings">Settings
        <div class="dropdown">
            <div onclick="setTheme('dark')">Dark Theme</div>
            <div onclick="setTheme('light')">Light Theme</div>
            <hr style="border:0; border-top:1px solid var(--border)">
            <div onclick="setLanguage('en')">English</div>
            <div onclick="setLanguage('uk')">Українська</div>
        </div>
    </div>
    <div class="menu-item" id="m-help" onclick="alert('Traffic Generator Help')">Help</div>
</nav>

<main>
    <section class="sidebar">
        <div class="group-box">
            <h3 id="t-params">Parameters</h3>
            <div class="form-grid">
                <label id="l-interface">Interface:</label>
                <input type="text" value="None" id="in-interface" readonly>
                <label id="l-mode">Mode:</label>
                <select id="in-mode">
                    <option value="0">None</option>
                </select>

                <label id="l-speed">Pref. Speed:</label>
                <input type="number" value="0" id="in-speed">

                <label id="l-pkt-size">Packet Size:</label>
                <input type="number" value="16" id="in-size">

                <label>Burst Size:</label>
                <input type="number" value="1" id="in-burst">

                <label>Copies:</label>
                <input type="number" value="0" id="in-copies">

                <label>Sent:</label>
                <input type="number" value="0" id="in-sent">

                <label>Packet Pattern:</label>
                <input type="text" value="AA" maxlength="2" id="in-pattern">

                <label id="l-time">Time:</label>
                <input type="time" value="00:00:00" step="1" id="in-time">
            </div>

            <div class="btn-row">
                <button class="btn-start" id="btn-start" onclick="onStartClicked()">▶ Start</button>
                <button class="btn-pause" id="btn-pause" onclick="onPauseClicked()" disabled>|| Pause</button>
            </div>
        </div>
    </section>

    <section class="dashboard">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label" id="l-stat-speed">Current Speed</div>
                <div class="stat-value"><span id="val-speed">0.00</span> <small style="font-size:12px" id="val-unit">Mbps</small></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">PPS</div>
                <div class="stat-value" id="val-pps">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label" id="l-stat-total">Total Sent</div>
                <div class="stat-value" id="val-total">0</div>
            </div>
        </div>

        <div style="flex:1; display:flex; flex-direction:column;">
            <div class="tabs">
                <div class="tab active" onclick="switchUnit('bps', this)">Bits / s</div>
                <div class="tab" onclick="switchUnit('BPS', this)">Bytes / s</div>
            </div>
            <div class="chart-area">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </section>
</main>

<script>
    let socket = null;
    let isInitialized = false;
    let isRunning = false;
    let isPaused = false;

    let currentUnit = "bps";
    let rawHistory = { bps: [], BPS: [] };

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: "bps", data: [], borderColor: '#007acc', borderWidth: 2, tension: 0.2, fill: false }] },
            options: { animation: false, responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { beginAtZero: true } } }
        });
    }

    function formatSpeed(value, isBytes) {
        const base = isBytes ? 1024 : 1000;
        const units = isBytes ? ['B/s', 'KB/s', 'MB/s', 'GB/s'] : ['bps', 'kbps', 'Mbps', 'Gbps'];
        let i = 0;
        while (value >= base && i < units.length - 1) {
            value /= base;
            i++;
        }
        return { val: value.toFixed(2), unit: units[i] };
    }

    function switchUnit(unit, el) {
        currentUnit = unit;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        updateChartDisplay();
    }

    function updateTimer(backendTime) {
        if (backendTime <= 0) return;

        let timeInput = document.getElementById('in-time');
        let parts = timeInput.value.split(':').map(Number);
        let seconds = parts[0] * 3600 + parts[1] * 60 + parts[2];

        // Logic from Qt: if starting time was 0, it's uptime. Else, it's countdown.
        if (initialTimeWasZero) {
            seconds++;
        } else {
            seconds = Math.max(0, seconds - 1);
        }

        let h = Math.floor(seconds / 3600).toString().padStart(2, '0');
        let m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
        let s = (seconds % 60).toString().padStart(2, '0');
        timeInput.value = `${h}:${m}:${s}`;
    }

    function updateChartDisplay() {
        const dataKey = currentUnit; // 'bps' or 'BPS'
        const isBytes = currentUnit === 'BPS';

        // Calculate units based on the latest value to match Qt's rescale logic
        const latest = rawHistory[dataKey][rawHistory[dataKey].length - 1] || 0;
        const formatted = formatSpeed(latest, isBytes);

        // Rescale all visible history to current unit
        const base = isBytes ? 1024 : 1000;
        const units = isBytes ? ['B/s', 'KB/s', 'MB/s', 'GB/s'] : ['bps', 'kbps', 'Mbps', 'Gbps'];
        const unitIndex = units.indexOf(formatted.unit);
        const scaleDivisor = Math.pow(base, unitIndex);

        chart.data.datasets[0].label = formatted.unit;
        chart.data.datasets[0].data = rawHistory[dataKey].map(v => v / scaleDivisor);

        // Dynamic Y-Axis rounding logic from Qt (val * 1.5 rounded to nearest power of 10)
        const maxVal = Math.max(...chart.data.datasets[0].data, 1);
        const rawRange = maxVal * 1.5;
        const step = Math.pow(10, Math.floor(Math.log10(rawRange)));
        chart.options.scales.y.max = Math.ceil(rawRange / step) * step;

        chart.update();

        // Update Big Stat Card
        document.getElementById('val-speed').innerText = formatted.val;
        document.getElementById('val-unit').innerText = formatted.unit;
    }

    function processDataResponse(obj) {
        if (!isRunning) return;

        const bps = Number(obj["bps"] || 0);
        const BPS = Number(obj["BPS"] || 0);
        const pps = Number(obj["pps"] || 0);
        const total = Number(obj["totalSend"] || 0);
        const timeVal = Number(obj["time"] || 0);

        // Update History
        rawHistory.bps.push(bps);
        rawHistory.BPS.push(BPS);
        if (rawHistory.bps.length > 50) {
            rawHistory.bps.shift();
            rawHistory.BPS.shift();
        }

        chart.data.labels.push('');
        if (chart.data.labels.length > 50) chart.data.labels.shift();

        updateChartDisplay();
        updateTimer(timeVal);

        document.getElementById('val-pps').innerText = pps.toLocaleString();
        document.getElementById('val-total').innerText = total.toLocaleString();
    }

    let initialTimeWasZero = true;

    // ===== UI =====
    function updateUI(bps, BPS, pps, total) {
        document.getElementById('val-speed').innerText = bps.toFixed(2);
        document.getElementById('val-pps').innerText = pps;
        document.getElementById('val-total').innerText = total;
    }

    // ===================== INIT =====================
    function initConnection() {
        const urlParams = new URLSearchParams(window.location.search);
        let targetHost = urlParams.get('host') || window.location.hostname;
        let targetPort = urlParams.get('target_port') || "8080";

        const hostClean = targetHost.replace(/^https?:\/\//, '');
        const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const connectionUrl = `${wsProtocol}${hostClean}`;

        console.log("[WS] Connecting:", connectionUrl); //

        socket = new WebSocket(connectionUrl);

        socket.onopen = () => {
            console.log("[WS] Connected");
        };

        socket.onmessage = (event) => {
            handleMessage(event.data);
        };

        socket.onclose = () => {
            console.warn("[WS] Connection closed");
            isRunning = false;
            isPaused = false;
            resetUIState();
        };

        socket.onerror = (err) => {
            console.error("[WS] Error:", err);
        };
    }


    // ===================== PLACEHOLDERS =====================
    function processInterfaceInfo(obj) {
        console.log("[INIT]", obj);
        const interface = document.getElementById('in-interface');
        interface.value = obj["InterfaceName"];
        const modesEl = document.getElementById('in-mode');
        modesEl.innerHTML = ""; // clear previous options

        if (obj.PfRingSupported) {
            console.log("[INIT] PF_RING SUPPORTED. Setting option");
            const option = document.createElement("option");
            option.value = "1";      // backend can parse this
            option.textContent = "PF_RING";
            modesEl.appendChild(option);
        }

        if (obj.PfRingZcSupported) {
            console.log("[INIT] PF_RING ZC SUPPORTED. Setting option");
            const option = document.createElement("option");
            option.value = "2";
            option.textContent = "PF_RING ZC";
            modesEl.appendChild(option);
        }

        if (obj.DpdkSupported) {
            console.log("[INIT] DPDK SUPPORTED. Setting option");
            const option = document.createElement("option");
            option.value = "4";
            option.textContent = "DPDK";
            modesEl.appendChild(option);
        }

        // If nothing supported
        if (modesEl.options.length === 0) {
            console.log("[INIT] NONE SUPPORTED. Setting option");
            const option = document.createElement("option");
            option.value = "0";
            option.textContent = "None";
            modesEl.appendChild(option);
        }
    }

    // ===================== UI RESET =====================
    function resetUIState() {
        const btn = document.getElementById('btn-start');
        const pauseBtn = document.getElementById('btn-pause');

        btn.innerText = "▶ Start";
        btn.style.background = "var(--primary)";
        pauseBtn.disabled = true;
        pauseBtn.innerText = "|| Pause";
    }

    // ===================== MESSAGE HANDLER =====================
    function handleMessage(rawData) {
        try {
            const json = JSON.parse(rawData);
            const obj = Array.isArray(json) ? json[0] : json;

            // --- ERROR ---
            if (obj.error) {
                alert(obj.error);
                socket.close();
                return;
            }

            // --- HANDSHAKE ---
            if (obj.status === "CONNECTED") {
                processInterfaceInfo(obj);
                isInitialized = true;
                return;
            }

            // --- ACK ---
            if (obj.type === "ACK") {
                handleAck(obj);
                return;
            }

            // --- DATA ---
            processDataResponse(obj);

        } catch (e) {
            console.error("[WS] JSON parse error", e);
        }
    }

    // ===================== ACK HANDLER =====================
    function handleAck(obj) {
        console.log("[ACK]", obj);

        const status = obj.status;

        const btn = document.getElementById('btn-start');
        const pauseBtn = document.getElementById('btn-pause');

        switch (status) {
            case "STARTED":
                isRunning = true;
                btn.innerText = "■ Stop";
                btn.style.background = "var(--error)";
                pauseBtn.disabled = false;
                break;

            case "STOPPED":
                isRunning = false;
                resetUIState();
                break;

            case "PAUSED":
                isPaused = true;
                pauseBtn.innerText = "▶ Resume";
                break;

            case "RESUMED":
                isPaused = false;
                pauseBtn.innerText = "|| Pause";
                break;
        }
    }

    // ===================== START =====================
    function onStartClicked() {
        console.log("Start CLICKED");
        if (!socket || socket.readyState !== WebSocket.OPEN) {
            console.error("[WS] Not connected");
            return;
        }

        if (isRunning) {
            stopGenerator();
            return;
        }

        rawHistory = { bps: [], BPS: [] };
        chart.data.labels = [];
        chart.data.datasets[0].data = [];
        document.getElementById('val-total').innerText = "0";
        document.getElementById('val-pps').innerText = "0";

        const timeVal = document.getElementById('in-time').value;
        initialTimeWasZero = (timeVal === "00:00:00");

        const payload = [{
            TYPE: 2,
            COMMAND: 0,
            MODE: parseInt(document.getElementById('in-mode').value),
            SPEED: document.getElementById('in-speed').value,
            PACK_SIZE: document.getElementById('in-size').value,
            BURST_SIZE: document.getElementById('in-burst').value,
            PACK_PATTERN: document.getElementById('in-pattern').value,
            COPIES: document.getElementById('in-copies').value,
            TOTAL_SEND: document.getElementById('in-sent').value
        }];

        console.log("JSON: ", payload);

        socket.send(JSON.stringify(payload));
    }

    // ===================== STOP =====================
    function stopGenerator() {
        if (!socket || socket.readyState !== WebSocket.OPEN) return;

        socket.send(JSON.stringify([{
            TYPE: 2,
            COMMAND: 3
        }]));
    }

    // ===================== PAUSE / RESUME =====================
    function onPauseClicked() {
        if (!socket || socket.readyState !== WebSocket.OPEN) return;

        const cmd = isPaused ? 2 : 1;

        socket.send(JSON.stringify([{
            TYPE: 2,
            COMMAND: cmd
        }]));
    }

    // ===================== INIT CALL =====================
    window.onload = () => {
        initConnection();
        initChart();
    };
</script>

</body>
</html>
